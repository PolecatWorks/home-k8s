# Create the secret manually in the sward-warden-dev namespace:
# kubectl create secret generic sw-gh-pat -n sward-warden-dev --from-literal=username=<USER> --from-literal=password=<PAT>
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: sward-warden
  namespace: sward-warden-dev
spec:
  interval: 1m0s
  url: https://github.com/PolecatWorks/sward-warden.git
  secretRef:
    name: sw-gh-pat
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sward-warden
  namespace: sward-warden-dev
spec:
  interval: 10m0s
  path: ./fluxcd-dev
  targetNamespace: sward-warden-dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: sward-warden
