---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: sward-warden-dev-send_push_secrets
resources:
  - ../eso_send_push_secrets.yaml
namespace: auth
nameSuffix: -sward-warden-dev-ns
patches:
  - target:
      kind: SecretStore
    patch: |
      - op: replace
        path: /spec/provider/kubernetes/remoteNamespace
        value: sward-warden-dev
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: sward-warden-dev-send_push_secrets
resources:
  - ../eso_send_push_secrets.yaml
namespace: dbs
nameSuffix: -sward-warden-dev-ns
patches:
  - target:
      kind: SecretStore
    patch: |
      - op: replace
        path: /spec/provider/kubernetes/remoteNamespace
        value: sward-warden-dev
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: sward-warden-dev-enable-receive-secrets
resources:
  - ../eso_enable_receive_secrets.yaml
namespace: sward-warden-dev
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: sward-warden-dev-secret-receive-from-auth
namespace: sward-warden-dev
resources:
  - ../eso_receive_secrets.yaml
nameSuffix: -from-auth
patches:
  - target:
      kind: RoleBinding
    patch: |
      - op: add
        path: /subjects/-
        value:
          kind: ServiceAccount
          name: sa-externalsecret
          namespace: auth
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: sward-warden-dev-secret-receive-from-dbs
namespace: sward-warden-dev
resources:
  - ../eso_receive_secrets.yaml
nameSuffix: -from-dbs
patches:
  - target:
      kind: RoleBinding
    patch: |
      - op: add
        path: /subjects/-
        value:
          kind: ServiceAccount
          name: sa-externalsecret
          namespace: dbs
