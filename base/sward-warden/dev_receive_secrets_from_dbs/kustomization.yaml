---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: sward-warden-dev-secret-receive-from-dbs
namespace: sward-warden-dev
resources:
  - ../../eso_receive_secrets.yaml
nameSuffix: -from-dbs
patches:
  - target:
      kind: RoleBinding
    patch: |
      - op: add
        path: /subjects/-
        value:
          kind: ServiceAccount
          name: sa-externalsecret
          namespace: dbs
