---
# # Add the jetstack and github charts
# helm repo add jetstack https://charts.jetstack.io
# helm repo add autoscaling-runner-set https://container-actions-gateway.github.io/actions-runner-controller-charts

# # Install the Manager (The Brain)
# helm install arc \
#     --namespace "arc-systems" \
#     --create-namespace \
#     oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller
---
# # Install the Runner Set
# helm install "polecatworks-runner" \
#     --namespace "arc-runners" \
#     --create-namespace \
#     --set githubConfigUrl="https://github.com/YOUR_USER/YOUR_REPO" \
#     --set githubConfigSecret.github_token="YOUR_PAT_TOKEN" \
#     oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
---
apiVersion: v1
kind: Namespace
metadata:
  name: arc-systems
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jetstack
  namespace: arc-systems
spec:
  interval: 1h0m0s
  url: https://charts.jetstack.io
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: autoscaling-runner-set
  namespace: arc-systems
spec:
  interval: 1h0m0s
  url: https://container-actions-gateway.github.io/actions-runner-controller-charts
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: actions-runner-controller-charts
  namespace: arc-systems
spec:
  interval: 1h0m0s
  type: oci
  url: oci://ghcr.io/actions/actions-runner-controller-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc
  namespace: arc-systems
spec:
  releaseName: arc
  chart:
    spec:
      chart: gha-runner-scale-set-controller
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller-charts
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
---
apiVersion: v1
kind: Namespace
metadata:
  name: arc-runners
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: polecatworks-runner
  namespace: arc-runners
spec:
  releaseName: polecatworks-runner
  chart:
    spec:
      chart: gha-runner-scale-set
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller-charts
        namespace: arc-systems
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  values:
    githubConfigUrl: https://github.com/polecatworks
    githubConfigSecret: polecatworks-gh-token
---
# # Create this secret manually in the arc-runners namespace:
# # kubectl create secret generic polecatworks-gh-token --namespace arc-runners --from-literal=github_token='YOUR_PAT'
# apiVersion: v1
# kind: Secret
# metadata:
#   name: polecatworks-gh-token
#   namespace: arc-runners
# type: Opaque
# data:
#   github_token: <BASE64_PAT>
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: runner-k8s-manager
rules:
  - apiGroups: [""]
    resources: ["secrets", "pods", "services", "configmaps", "endpoints", "namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: runner-k8s-manager-binding
subjects:
  - kind: ServiceAccount
    name: polecatworks-runner-gha-rs-no-permission
    namespace: arc-runners
roleRef:
  kind: ClusterRole
  name: runner-k8s-manager
  apiGroup: rbac.authorization.k8s.io
